---
layout: default
---

<a href="{{ '/box-notes/' | relative_url }}" class="back-link">Box Notes</a>

<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="meta">
      <span>{{ page.date | date: "%Y-%m-%d" }}</span>
      {% if page.os %}<span>{{ page.os }}</span>{% endif %}
      {% if page.difficulty %}<span>{{ page.difficulty }}</span>{% endif %}
      {% if page.tags %}
        <span>{{ page.tags | join: ", " }}</span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
